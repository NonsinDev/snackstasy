<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Buchung</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            display: none;
            margin-top: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }

        .result.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            color: #28a745;
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        .button-secondary {
            background: #6c757d;
        }

        .button-secondary:hover {
            box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
        }

        .button-success {
            background: #28a745;
        }

        .button-success:hover {
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }

        .error {
            color: #dc3545;
            background-color: #f8d7da;
            border: 2px solid #f5c6cb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            animation: slideUp 0.3s ease-out;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 500;
        }

        /* Versteckte Ticket-Vorschau für PDF */
        #ticketPreview {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎫 Ticket Buchung</h1>

    <form id="bookingForm">
        <div class="form-group">
            <label for="firstName">Vorname</label>
            <input type="text" id="firstName" name="firstName" placeholder="z.B. Max" required>
        </div>
        <div class="form-group">
            <label for="lastName">Nachname</label>
            <input type="text" id="lastName" name="lastName" placeholder="z.B. Mustermann" required>
        </div>
        <button type="submit">Ticket buchen</button>
    </form>

    <div id="result" class="result"></div>
</div>

<!-- Versteckte Ticket-Vorschau für PDF-Export -->
<div id="ticketPreview"></div>

<script>

    const BaseUrl = "http://localhost:5002/v1";

    async function getTicketData(ticket_id) {
        try {
            const res = await axios.get(`${BaseUrl}/tickets/${ticket_id}`);
            return res.data;
        } catch (err) {
            console.error("Fehler beim Laden der Ticket-Daten", err);
            return null;
        }
    }

            let lastTicketData = null;

            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                const resultDiv = document.getElementById('result');

                // Validierung
                if (!firstName || !lastName) {
                    resultDiv.innerHTML = '<div class="error">Bitte füllen Sie alle Felder aus.</div>';
                    resultDiv.classList.add('show');
                    return;
                }

                // Loading-Zustand
                resultDiv.innerHTML = '<div class="loading">Ticket wird erstellt...</div>';
                resultDiv.classList.add('show');

                try {
                    const response = await fetch('http://localhost:5002/v1/tickets/book', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            first_name: firstName,
                            last_name: lastName
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        lastTicketData = data;
                        console.log(data);
                        const qrContent = `${data.last_name} ${data.first_name} ${data.id}`;

                        resultDiv.innerHTML = `
                            <h2>Ticket erfolgreich erstellt!</h2>
                            <div class="button-group">
                                <button type="button" class="button-success" onclick="openTicketInNewTab()">📄 Im Browser ansehen</button>
                                <button type="button" class="button-success" onclick="downloadTicketAsPDF()">📥 Als PDF herunterladen</button>
                            </div>
                            <button type="button" class="button-secondary" onclick="location.reload()">➕ Neues Ticket</button>
                        `;

                        // QR-Code generieren und speichern (nicht in Vorschau anzeigen)
                        generateQRCode(qrContent);

                        document.getElementById('bookingForm').reset();
                    } else {
                        resultDiv.innerHTML = `<div class="error">Fehler: ${escapeHtml(data.error || 'Unbekannter Fehler')}</div>`;
                    }
                } catch (error) {
                    resultDiv.innerHTML = `<div class="error">Fehler beim Buchen: ${escapeHtml(error.message)}</div>`;
                }
            });

            function generateQRCode(content) {
                // QR-Code wird später beim Anzeigen/PDF-Export generiert
                // Hier speichern wir nur den Inhalt
                lastTicketData.qrContent = content;
            }

            function openTicketInNewTab() {
                if (!lastTicketData) return;

                const ticketHTML = generateTicketHTML(lastTicketData);
                const newWindow = window.open('', '_blank');
                newWindow.document.write(ticketHTML);
                newWindow.document.close();
            }

            async function downloadTicketAsPDF() {
        if (!lastTicketData) return;

        const ticket_id = lastTicketData.ticketId || lastTicketData.id;

        const data = await getTicketData(ticket_id);
        if (!data) return;

        const ticketData = {
            id: ticket_id,
            first_name: data.first_name ?? "",
            last_name: data.last_name ?? "",
            qrContent: `${ticket_id}`
        };

        const element = document.createElement('div');
        element.innerHTML = generateTicketHTML(ticketData);

        document.body.appendChild(element);

        // 🔥 QR-Code erzeugen (JETZT korrekt!)
        await renderQRCode(element, ticketData.qrContent);

        // kurz warten für Rendering
        await new Promise(resolve => setTimeout(resolve, 300));

        const opt = {
            margin: 10,
            filename: `Ticket_${ticketData.id}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
        };

        await html2pdf().set(opt).from(element).save();

        document.body.removeChild(element);
    }

    function generateTicketHTML(ticketData) {
        return `
            <div class="ticket-container">
                <div class="ticket-header">
                    <h1>🎫 Ticket</h1>
                    <p>Gültig für die Veranstaltung</p>
                </div>

                <div class="ticket-info">
                    <div class="info-row">
                        <span class="info-label">Ticket-ID:</span>
                        <span class="info-value">${escapeHtml(String(ticketData.id))}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Vorname:</span>
                        <span class="info-value">${escapeHtml(ticketData.first_name)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Nachname:</span>
                        <span class="info-value">${escapeHtml(ticketData.last_name)}</span>
                    </div>
                </div>

                <div class="qr-code-container">
                    <canvas class="qrCanvas"></canvas>
                    <div class="qr-label">QR-Code</div>
                </div>
            </div>
        `;
    }

    async function renderQRCode(container, content) {
        const canvas = container.querySelector('.qrCanvas');
        if (!canvas) return;

        await QRCode.toCanvas(canvas, content, {
            width: 300,
            margin: 1
        });
    }

            function escapeHtml(text) {
        if (text === null || text === undefined) return "";

        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };

        return String(text).replace(/[&<>"']/g, m => map[m]);
    }
</script>
</body>
</html>
