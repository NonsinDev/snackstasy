version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: snackstasy
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      # Host-Port 3305 -> Container-Port 3306 (MySQL Standard)
      - "3305:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: snackstasy
      DB_USER: appuser
      DB_PASSWORD: apppass
    ports:
      # Host-Port 5002 -> Container-Port 5002 (Program.cs Einstellung)
      - "5002:5002"
